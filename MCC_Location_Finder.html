  <style>

    .row{display:flex; gap:10px; align-items:center;}
    input {
      flex:1;
      font-size:16px;
      padding:12px 14px;
      border-radius:14px;
      border:2px solid #d1d5db;
      outline:none;
    }
    input:focus{border-color:var(--blue)}
    button {
      padding:11px 12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#f8fafc;
      font-weight:700;
      color:var(--text);
    }
    button.primary{background:var(--blue); color:white; border-color:var(--blue)}
    .metaRow{display:flex; justify-content:space-between; gap:10px; margin-top:10px; color:var(--muted); font-size:13px}
    .list{margin-top:12px; display:flex; flex-direction:column; gap:10px}
    .card{background:var(--card); border:1px solid var(--border); border-radius:18px; padding:14px; box-shadow:0 10px 25px rgba(0,0,0,.06);}
    .top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
    .name{font-weight:800; font-size:16px; line-height:1.25; margin:0}
    .badge{white-space:nowrap; font-size:11px; font-weight:900; padding:6px 10px; border-radius:999px; border:1px solid;}
    .inv{background:#fffbeb; border-color:var(--amber); color:#92400e}
    .dol{background:#f3f4f6; border-color:#9ca3af; color:#374151}
    .line{margin-top:8px; color:var(--muted); font-size:14px}
    .strong{font-weight:800; color:var(--text)}
    .drive{font-weight:900; color:#1d4ed8}
    .empty{text-align:center; color:var(--gray); padding:18px}
    .hint{margin-top:14px; text-align:center; color:var(--gray); font-size:12px}
    .pill{display:inline-block; padding:3px 8px; border-radius:999px; border:1px solid var(--border); background:#f8fafc; font-size:12px; color:var(--muted)}
  </style>
</head>

  const qEl = document.getElementById("q");
  const listEl = document.getElementById("list");
  const countEl = document.getElementById("count");
  const clearEl = document.getElementById("clear");

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (c)=>({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function render(items, term){
    listEl.innerHTML = "";
    if(!term){
      countEl.textContent = "Type to search…";
      return;
    }
    countEl.innerHTML = `Showing <strong>${items.length}</strong> result${items.length===1?'':'s'} for “${escapeHtml(term)}”`;
    if(items.length===0){
      listEl.innerHTML = `<div class="card empty">No matches for “${escapeHtml(term)}”</div>`;
      return;
    }
    const html = items.map(it=>{
      const badgeClass = it.inverter ? "badge inv" : "badge dol";
      const badgeText = it.inverter ? "INVERTER" : "DOL";
      return `
        <div class="card">
          <div class="top">
            <p class="name">${escapeHtml(it.name)}</p>
            <span class="${badgeClass}">${badgeText}</span>
          </div>
          <div class="line">Area: <span class="strong">${escapeHtml(it.area || "—")}</span></div>
          <div class="line">Drive: <span class="drive">${escapeHtml(it.drive || "—")}</span></div>
          <div class="line">MCC: <span class="strong">${escapeHtml(it.mcc || "—")}</span></div>
        </div>`;
    }).join("");
    listEl.innerHTML = html;
  }

  function search(term){
    const t = term.trim().toLowerCase();
    if(!t) return [];
    const out = [];
    for(const it of DATA){
      const name = (it.name||"").toLowerCase();
      const drive = String(it.drive||"").toLowerCase();
      const mcc = (it.mcc||"").toLowerCase();
      const area = (it.area||"").toLowerCase();
      if(name.includes(t) || drive.includes(t) || mcc.includes(t) || area.includes(t)) {
        out.push(it);
        if(out.length>=200) break;
      }
    }
    return out;
  }

  qEl.addEventListener("input", (e)=> {
    const term = e.target.value;
    render(search(term), term.trim());
